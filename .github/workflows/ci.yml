name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

# ⭐ 防止重复发布
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
# -------------------------------------------------
# 1️⃣ 判断版本是否变化
# -------------------------------------------------
  check_version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV=$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")
          else
            PREV=""
          fi

          if [ "$VERSION" != "$PREV" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

# -------------------------------------------------
# 2️⃣ 提前创建空 Release（避免多平台并发打包时冲突）
# -------------------------------------------------
  create_release:
    needs: check_version
    if: needs.check_version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check_version.outputs.version }}
          name: v${{ needs.check_version.outputs.version }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# -------------------------------------------------
# 3️⃣ 各系统打包并直接直传 Release（彻底绕过 Artifact Quota）
# -------------------------------------------------
  build:
    needs: [check_version, create_release]
    if: needs.check_version.outputs.version_changed == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Prepare Apple Code Signing
        if: runner.os == 'macOS'
        run: |
          echo "Bypassing macOS code signing and notarization for CI..."
          export CSC_IDENTITY_AUTO_DISCOVERY=false

      - name: Package & Publish directly to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        shell: bash
        run: |
          # 必须配置全局 Git 用户以便 Electron-builder 生成 latest.yml 和 blockmap
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win --publish always
          elif [ "$RUNNER_OS" == "macOS" ]; then
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            npx electron-builder --mac --publish always || true
          else
            npx electron-builder --linux AppImage deb --publish always
          fi
