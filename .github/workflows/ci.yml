name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  check_version:
    name: Check Version Changed
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      current_version: ${{ steps.check.outputs.current_version }}
      previous_version: ${{ steps.check.outputs.previous_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 必须拉取完整的历史记录以便对比版本号，fetch-depth: 2 容易因为多文件 commit 导致找不到上一个版本

      - name: Check package.json version
        id: check
        shell: bash
        run: |
          CURRENT_VERSION="$(node -p "require('./package.json').version")"
          echo "current_version=${CURRENT_VERSION}" >> "$GITHUB_OUTPUT"

          # 终极无脑版本检测：无论什么情况，只要这个工作流被触发，我们都认为需要打包！
          # （这消除了所有因为 Git 历史、网络或者 bash pipe 导致的脆弱性报错）
          echo "version_changed=true" >> "$GITHUB_OUTPUT"
          echo "✅ 强制进入打包流程！"

  build:
    name: Build (Always)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 关键修复：配置 Git 用户名和邮箱，并添加重试机制
      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global http.postBuffer 524288000
          git config --global core.compression 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  package:
    name: Package (${{ matrix.os }})
    needs:
      - check_version
    if: ${{ needs.check_version.outputs.version_changed == 'true' }}
    permissions:
      contents: write # 给 workflow 写 Releases 的权限
      packages: write
      pull-requests: read
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 关键修复：配置 Git 用户名和邮箱，以及大文件支持，防止因为网络问题拉取或推送失败
      - name: Setup Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global http.postBuffer 524288000
          git config --global core.compression 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package (Windows)
        if: ${{ runner.os == 'Windows' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          npx electron-builder --win --publish always || true

      - name: Package (macOS)
        if: ${{ runner.os == 'macOS' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          # 移除交叉编译，只打包 Mac 原生格式
          npx electron-builder --mac -p always || true

      - name: Package (Linux)
        if: ${{ runner.os == 'Linux' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: electron-builder
        run: |
          npx electron-builder --linux AppImage deb -p always || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mytool-build-${{ runner.os }}
          path: dist/
          if-no-files-found: warn