name: CI

on:
  push:
    branches: [main]
  workflow_dispatch:

# ⭐ 防止重复发布
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
# -------------------------------------------------
# 1️⃣ 判断版本是否变化
# -------------------------------------------------
  check_version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.check.outputs.version_changed }}
      version: ${{ steps.check.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREV=$(git show HEAD^:package.json | node -p "JSON.parse(require('fs').readFileSync(0)).version")
          else
            PREV=""
          fi

          if [ "$VERSION" != "$PREV" ]; then
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

# -------------------------------------------------
# 2️⃣ 各系统打包
# -------------------------------------------------
  build:
    needs: check_version
    if: |
      needs.check_version.outputs.version_changed == 'true' ||
      github.event_name == 'workflow_dispatch'

    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            npx electron-builder --win --publish never
          elif [ "$RUNNER_OS" == "macOS" ]; then
            npx electron-builder --mac --publish never
          else
            npx electron-builder --linux AppImage deb --publish never
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ runner.os }}
          # 关键修改：根据 electron-builder.yml 中的配置，各平台的打包结果会分别输出到 dist/win、dist/mac、dist/linux 目录中
          path: |
            dist/**/*.exe
            dist/**/*.dmg
            dist/**/*.AppImage
            dist/**/*.deb
            dist/**/*.yml
            dist/**/*.blockmap

# -------------------------------------------------
# 3️⃣ 发布 Release
# -------------------------------------------------
  release:
    needs: [check_version, build]
    if: |
      needs.check_version.outputs.version_changed == 'true' ||
      github.event_name == 'workflow_dispatch'

    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check_version.outputs.version }}
          name: v${{ needs.check_version.outputs.version }}
          files: artifacts/**/*
          fail_on_unmatched_files: false
          overwrite_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
